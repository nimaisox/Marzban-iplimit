name: Build-Dev and Upload Marzban iplimit

on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            os_name: linux
            arch: x86_64
          - os: ubuntu-20.04
            os_name: linux
            arch: arm64
          - os: windows-2022
            os_name: windows
            arch: x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install your Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          include-package: "websockets,logging"
          include-module: "_bisect,_json"
          python-flag: "-OO"
          output-dir: .
          output-file: |
            ${{ (matrix.os == 'windows-2022' && 'marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}.exe') || 'marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}.bin' }}

      - uses: actions/upload-artifact@v4
        with:
          name: marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}
          path: |
            ${{ (matrix.os == 'windows-2022' && './marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}.exe') || './marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}.bin' }}

  download-and-use:
    needs: [build]
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            os_name: linux
            arch: x86_64
          - os: ubuntu-20.04
            os_name: linux
            arch: arm64
          - os: windows-2022
            os_name: windows
            arch: x86_64
    steps:
      - name: Download Built Artifact
        uses: actions/download-artifact@v4
        with:
          name: marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}
          path: ./downloaded

      - name: Check File
        run: |
          ls -l ./downloaded
