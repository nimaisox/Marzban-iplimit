name: Build and Release

on:
  push:
    tags:
        - '*'
jobs:
  build:
    strategy:
      matrix:
        os: [windows-2022, ubuntu-20.04]
        platform: [amd64]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          include-package: "websockets"
          python-flag: "-OO"
          include-plugin-directory: "utils"
          output-dir: .
          output-file: marzban_iplimit_${{ matrix.platform }}_${{ matrix.os == 'windows-2022' && 'windows' || 'linux' }}.${{ matrix.os == 'windows-2022' && 'exe' || 'bin' }}
          static-libpython: ${{ matrix.os == 'ubuntu-20.04' && 'yes' || '' }}
          include-module: ${{ matrix.os == 'ubuntu-20.04' && '_bisect,_json' || '' }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marzban_iplimit_${{ matrix.platform }}_${{ matrix.os == 'windows-2022' && 'windows' || 'linux' }}
          path: |
            ./marzban_iplimit_${{ matrix.platform }}_${{ matrix.os == 'windows-2022' && 'windows' || 'linux' }}.${{ matrix.os == 'windows-2022' && 'exe' || 'bin' }}


  release:
    needs: [build]
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts (AMD64) Linux
        uses: actions/download-artifact@v4
        with:
          name: marzban_iplimit_amd64_linux
          path: ./artifacts/amd64_linux

      - name: Download artifacts (AMD64) Windows
        uses: actions/download-artifact@v4
        with:
          name: marzban_iplimit_amd64_windows
          path: ./artifacts/amd64_windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading AMD64 files..."
          gh release upload ${{ github.ref_name }} ./artifacts/amd64_linux/marzban_iplimit_amd64_linux.bin

          echo "Uploading AMD64 files..."
          gh release upload ${{ github.ref_name }} ./artifacts/amd64_windows/marzban_iplimit_amd64_windows.exe
