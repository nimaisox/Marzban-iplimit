name: Build and Upload

on: [push]

jobs:
  build-windows:
    strategy:
      matrix:
        platform:
          - amd64
          - arm64
    runs-on: windows-2022

    steps:
      - name: Check architecture
        run: |
          echo "Architecture: $(uname -m)"

      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable with Nuitka (Windows Specific)
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          include-package: "websockets"
          python-flag: "-OO"
          include-plugin-directory: "utils"
          output-dir: .
          output-file: marzban_iplimit_${{ matrix.platform }}_windows.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marzban_iplimit_${{ matrix.platform }}_windows
          path: |
            ./marzban_iplimit_${{ matrix.platform }}_windows.exe


  build-linux:
    strategy:
      matrix:
        platform:
          - amd64
          - arm64
    runs-on: ubuntu-20.04
    steps:
      - name: Check architecture
        run: |
          echo "Architecture: $(uname -m)"


      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install your Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          include-package: "websockets"
          include-module: "_bisect,_json"
          python-flag: "-OO"
          output-dir: .
          include-plugin-directory: "utils"
          output-file: marzban_iplimit_${{ matrix.platform }}_windows.bin

      - uses: actions/upload-artifact@v4
        with:
          name: marzban_iplimit_${{ matrix.platform }}_windows
          path: |
            ./marzban_iplimit_${{ matrix.platform }}_windows.bin
