name: Build and Upload

on: [push]

jobs:
  build-windows:
    strategy:
      matrix:
        os: [windows-latest]
        architecture: [x86_64, arm64]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable with Nuitka (Windows Specific)
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          include-package: "websockets,logging,httpx"
          include-module: "httpx"
          python-flag: "-OO"
          include-plugin-directory: "utils"
          output-dir: .
          output-file: marzban_iplimit_${{ matrix.architecture }}_${{ matrix.os }}.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}_${{ matrix.architecture }}_build
          path: |
            ./marzban_iplimit_${{ matrix.architecture }}_${{ matrix.os }}.exe


  build-linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            os_name: linux
            arch: x86_64
          - os: ubuntu-20.04
            os_name: linux
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install your Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          include-package: "websockets,logging,httpx"
          include-module: "_bisect,_json,httpx"
          python-flag: "-OO"
          output-dir: .
          include-plugin-directory: "utils"
          output-file: marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}.bin

      - uses: actions/upload-artifact@v4
        with:
          name: marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}
          path: |
            ./marzban_iplimit_${{ matrix.arch }}_${{ matrix.os_name }}.bin
