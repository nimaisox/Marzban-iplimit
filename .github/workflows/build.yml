name: Build and Upload Marzban iplimit

on:
  push:
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - "marzban-iplimit.sh"
      - "config.sample.json"
      - "docs/**"
      - ".github/**"

jobs:
  check-pylint:
    runs-on: [ubuntu-latest]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint==3.3.3
      - name: Analyzing the code with pylint
        run: |
          pylint $(git ls-files '*.py')

  build:
    needs: check-pylint
    strategy:
      matrix:
        os: [ubuntu-latest] 
        arch: [x86_64, arm64]
        
    runs-on: [ubuntu-latest]

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install your Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: onefile
          include-package: "websockets,logging"
          include-module: "_bisect,_json"
          python-flag: "-OO"
          output-dir: .
          output-file: marzban-iplimit_${{ matrix.arch }}.bin

      - uses: actions/upload-artifact@v4
        with:
          name: marzban-iplimit-${{ matrix.arch }}
          path: |
            ./marzban-iplimit_${{ matrix.arch }}.bin
            ./marzban-iplimit.sh
  
      - uses: actions/download-artifact@v4
        with:
          name: marzban-iplimit-${{ matrix.arch }}
          path: marzban-iplimit